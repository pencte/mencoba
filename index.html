<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GTPS Launcher</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #020617, #000);
            color: white;
            font-family: Arial;
            overflow: hidden;
        }

        .bg {
            position: absolute;
            width: 500px;
            height: 500px;
            background: #22c55e;
            filter: blur(200px);
            opacity: 0.2;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
        }

        .box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15,23,42,0.9);
            padding: 30px;
            border-radius: 25px;
            width: 400px;
            text-align: center;
        }

        .play {
            width: 100%;
            padding: 15px;
            background: #22c55e;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="bg"></div>

    <div class="box">
        <h1 id="name">Loading...</h1>
        <p id="status">...</p>
        <h2 id="online">0</h2>

        <button class="play" onclick="join()">PLAY</button>

        <p>Worlds: <span id="worlds">0</span></p>
        <p>Guilds: <span id="guilds">0</span></p>
        <p>Accounts: <span id="accounts">0</span></p>
    </div>

    <script>
        let joinLink = "#";

        async function load() {
        const res = await fetch("/api/config");
        const c = await res.json();

        document.getElementById("name").innerText = c.server_name;
        document.getElementById("online").innerText = c.online + " Online";

        document.getElementById("worlds").innerText = c.worlds;
        document.getElementById("guilds").innerText = c.guilds;
        document.getElementById("accounts").innerText = c.accounts;

        document.getElementById("status").innerText =
        c.status === "UP" ? "🟢 Online" : "🔴 Offline";

        joinLink = c.join_link;
        }

        function join() {
        window.location.href = joinLink;
        }

        setInterval(load, 5000);
        load();
    </script>

</body>
</html>
