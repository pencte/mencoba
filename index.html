<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GTPS Launcher</title>

<style>
body {
    margin:0;
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
}

.box {
    margin-top:120px;
    background:#0f172a;
    padding:30px;
    border-radius:20px;
    width:350px;
    margin-left:auto;
    margin-right:auto;
}

button {
    padding:15px;
    width:100%;
    background:#22c55e;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2 id="name">Loading...</h2>
    <p id="status">...</p>
    <h3 id="online">0</h3>

    <button onclick="join()">PLAY</button>

    <p>Worlds: <span id="worlds">0</span></p>
    <p>Guilds: <span id="guilds">0</span></p>
    <p>Accounts: <span id="accounts">0</span></p>
</div>

<script>
let joinLink = "#";

async function load() {
    const res = await fetch("/api/config?" + Date.now());
    const c = await res.json();

    document.getElementById("name").innerText = c.server_name;
    document.getElementById("online").innerText = c.online + " Online";
    document.getElementById("worlds").innerText = c.worlds;
    document.getElementById("guilds").innerText = c.guilds;
    document.getElementById("accounts").innerText = c.accounts;

    document.getElementById("status").innerText =
        c.status === "UP" ? "🟢 Online" : "🔴 Offline";

    joinLink = c.join_link;
}

function join() {
    window.location.href = joinLink;
}

setInterval(load, 3000);
load();
</script>

</body>
</html>
