<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerorismePS</title>

<link rel="stylesheet" href="style.css">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<!-- ☰ MENU -->
<div class="menu-btn" onclick="toggleMenu()">
  <i class="fa-solid fa-bars"></i>
</div>

<!-- DROPDOWN -->
<div id="menuDropdown" class="menu-dropdown">
  <div onclick="openTab('home')"><i class="fa-solid fa-house"></i> Home</div>
  <div onclick="openTab('howto')"><i class="fa-solid fa-book"></i> How To Play</div>
</div>

<div class="card">

  <!-- HOME -->
  <div id="homeTab" class="tab active slide-in">

    <div id="statusBox" class="status-box"></div>

    <div class="toggle" onclick="toggleMode()">
      <i class="fa-solid fa-moon"></i>
    </div>

    <div class="title">TerorismePS</div>
    <div id="statusText" class="status-text">-</div>

    <div class="banner"></div>

    <div class="row">
      <div class="join-btn" onclick="join()">
        <i class="fa-solid fa-play"></i> JOIN
      </div>
      <div class="online-box">
        <i class="fa-solid fa-users"></i> <span id="players">0</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><i class="fa-solid fa-globe"></i><br><span id="worlds">0</span></div>
      <div class="stat"><i class="fa-solid fa-user"></i><br><span id="accounts">0</span></div>
      <div class="stat"><i class="fa-solid fa-shield"></i><br><span id="guilds">0</span></div>
    </div>

  </div>

  <!-- HOW TO PLAY -->
  <div id="howtoTab" class="tab">

    <div class="title">How To Play</div>

    <div class="howto-box">

      <div class="step active">
        <h3>Step 1</h3>
        <p>Download Growtopia</p>
      </div>

      <div class="step">
        <h3>Step 2</h3>
        <p>Install APK / Client</p>
      </div>

      <div class="step">
        <h3>Step 3</h3>
        <p>Connect ke server</p>
      </div>

      <div class="step">
        <h3>Step 4</h3>
        <p>Klik JOIN SERVER</p>
      </div>

      <div class="step">
        <h3>Step 5</h3>
        <p>Enjoy 🔥</p>
      </div>

      <div class="howto-nav">
        <button onclick="prevStep()">Prev</button>
        <button onclick="nextStep()">Next</button>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
